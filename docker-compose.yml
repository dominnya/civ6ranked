services:
  backend:
    image: ${IMAGE_LATEST}
    restart: unless-stopped
    ports:
      - '${PORT:-1212}:1212'
    env_file:
      - ./apps/backend/.env
      - ./apps/discord/.env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    env_file:
      - ./apps/backend/.env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
